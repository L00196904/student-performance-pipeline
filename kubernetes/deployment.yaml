apiVersion: apps/v1

kind: Deployment

metadata:
  name: student-performance-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: student-performance-app

  template:

    metadata:
      labels:
        app: student-performance-app

    spec:

      containers:

      - name: student-performance-container

        image: l00196904/student-performance-app:6e5d0b6cb1d1088b2fb033de8ad7e918c50897af

        imagePullPolicy: Always

        ports:
        - containerPort: 5000
