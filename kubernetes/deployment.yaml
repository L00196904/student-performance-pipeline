apiVersion: apps/v1

kind: Deployment

metadata:
  name: student-performance-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: student-performance-app

  template:

    metadata:
      labels:
        app: student-performance-app

    spec:

      containers:

      - name: student-performance-container

        image: l00196904/student-performance-app:d6456dfa6ad9424880cd1507a40dd16afdac5710

        imagePullPolicy: Always

        ports:
        - containerPort: 5000
